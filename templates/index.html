<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthTally</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        })();
    </script>

</head>
<body>

    <div class="build-tag">test_build#6</div>

    <div class="theme-toggle-btn">
        <button class="btn btn-outline-secondary rounded-circle p-2" id="theme-toggle">
            <i class="bi bi-moon-stars-fill" id="theme-icon-moon"></i>
            <i class="bi bi-sun-fill d-none" id="theme-icon-sun"></i>
        </button>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card main-card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">

                        <div class="brand-icon">
                            <i class="bi bi-shield-check"></i>
                        </div>
                        <h1 class="h3 fw-bold text-center mb-1">
                            <span class="brand-title">TruthTally</span>
                        </h1>
                        <p class="text-center text-muted mb-4">Get an AI-powered verdict on product reviews.</p>

                        <form id="url-form">
                            <div class="input-group mb-3 shadow-sm">
                                <input type="text" id="url-input" class="form-control form-control-lg rounded-start" name="product_url" placeholder="Paste Amazon URL here..." required>
                                <button type="submit" id="analyze-button" class="btn btn-gradient btn-lg fw-semibold rounded-end">Analyze</button>
                            </div>
                        </form>

                        <div id="loading-message" class="text-center my-4 d-none">
                            <div class="spinner-border" role="status" style="color: var(--accent-1);">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2 text-muted">Scraping and analyzing... This may take a moment.</p>
                        </div>

                        <div id="results-container"></div>
                    </div>
                </div>

                <p class="text-center text-muted small mt-3">Powered by Flask, Selenium, and Gemini</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const moonIcon = document.getElementById('theme-icon-moon');
        const sunIcon = document.getElementById('theme-icon-sun');
        const htmlEl = document.documentElement;

        if (htmlEl.getAttribute('data-bs-theme') === 'dark') {
            moonIcon.classList.add('d-none');
            sunIcon.classList.remove('d-none');
        }

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlEl.getAttribute('data-bs-theme');
            if (currentTheme === 'dark') {
                htmlEl.setAttribute('data-bs-theme', 'light');
                localStorage.setItem('theme', 'light');
                moonIcon.classList.remove('d-none');
                sunIcon.classList.add('d-none');
            } else {
                htmlEl.setAttribute('data-bs-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                moonIcon.classList.add('d-none');
                sunIcon.classList.remove('d-none');
            }
        });

        
        document.getElementById('url-form').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const loadingDiv = document.getElementById('loading-message');
            const resultsDiv = document.getElementById('results-container');
            const button = document.getElementById('analyze-button');
            const buttonText = button.innerHTML; 

            loadingDiv.classList.remove('d-none');
            resultsDiv.innerHTML = ''; 
            button.disabled = true;
            button.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Analyzing...';

            try {
                const formData = new FormData(this);
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                loadingDiv.classList.add('d-none');

                // The server should return JSON. If it returns HTML (e.g. a
                // Render 502/503 page after a worker crash or timeout), give a
                // friendly message instead of a raw JSON parse error.
                const raw = await response.text();
                let results;
                try {
                    results = JSON.parse(raw);
                } catch (e) {
                    if (response.status === 502 || response.status === 503 || response.status === 504) {
                        throw new Error('The server ran out of memory or timed out while analyzing (the free host is limited). Please wait a moment and try again.');
                    }
                    throw new Error(`The server returned an unexpected response (HTTP ${response.status}). Please try again.`);
                }

                if (!response.ok) {
                    throw new Error(results.error || 'Something went wrong');
                }

                // --- UPDATED Results HTML ---
                // All 4 list items are now present in this list.
                const interpretationBadge = results.interpretation === 'Overall Positive' ? 'bg-success'
                    : (results.interpretation === 'Overall Negative' ? 'bg-danger' : 'bg-warning');

                const resultsHTML = `
                    <div class="card bg-body-tertiary border-0 rounded-3 mt-4 animation-fade-in">
                        <div class="card-body">
                            <h4 class="card-title fw-semibold mb-3">Analysis Complete</h4>

                            <div class="verdict-quote mb-4">
                                <p class="mb-1">"${results.verdict}"</p>
                                <small class="text-muted">— AI-Generated Verdict</small>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <h6><span class="pill-icon pros"><i class="bi bi-plus-lg"></i></span>Common Pros</h6>
                                    <ul class="list-unstyled ms-4">
                                        ${results.pros.map(pro => `<li><small>${pro}</small></li>`).join('')}
                                    </ul>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <h6><span class="pill-icon cons"><i class="bi bi-dash-lg"></i></span>Common Cons</h6>
                                    <ul class="list-unstyled ms-4">
                                        ${results.cons.map(con => `<li><small>${con}</small></li>`).join('')}
                                    </ul>
                                </div>
                            </div>

                            <div class="stat-grid mt-2">
                                <div class="stat-card">
                                    <div class="stat-label">Final Verdict (from scores)</div>
                                    <div class="stat-value"><span class="badge ${interpretationBadge}">${results.interpretation}</span></div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">Total Reviews Analyzed</div>
                                    <div class="stat-value">${results.review_count}</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">
                                        VADER Score (Sentiment)
                                        <i class="bi bi-info-circle-fill ms-1 text-muted"
                                           data-bs-toggle="tooltip"
                                           data-bs-placement="top"
                                           data-bs-title="Measures review opinion from -1.0 (very negative) to +1.0 (very positive). A score near 0.0 is neutral. Higher is better."></i>
                                    </div>
                                    <div class="stat-value">${results.avg_vader_score}</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">
                                        TextBlob Score (Polarity)
                                        <i class="bi bi-info-circle-fill ms-1 text-muted"
                                           data-bs-toggle="tooltip"
                                           data-bs-placement="top"
                                           data-bs-title="Measures review opinion from -1.0 (very negative) to +1.0 (very positive). A score near 0.0 is neutral. Higher is better."></i>
                                    </div>
                                    <div class="stat-value">${results.avg_tb_score}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                resultsDiv.innerHTML = resultsHTML;

                // --- INITIALIZE ALL TOOLTIPS ---
                const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
                tooltipTriggerList.map(function (tooltipTriggerEl) {
                    return new bootstrap.Tooltip(tooltipTriggerEl);
                });

            } catch (error) {
                loadingDiv.classList.add('d-none');
                resultsDiv.innerHTML = `
                    <div class="alert alert-danger mt-4" role="alert">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            } finally {
                button.disabled = false;
                button.innerHTML = buttonText;
            }
        });
    </script>
</body>
</html>
